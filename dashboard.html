<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dashboard | Vault Explorer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="p-4 md:p-8">
    <div id="alert-stack" class="fixed top-5 right-5 space-y-3 z-[100]"></div>

    <nav class="p-6 rounded-3xl flex flex-wrap gap-4 justify-between items-center mb-12 nav-blur border border-white/10">
        <h1 class="text-3xl font-black text-white italic">VAULT<span class="text-blue-500">.CORE</span></h1>
        
        <div class="flex-1 max-w-md mx-4">
            <div class="relative">
                <input type="text" id="vaultSearch" placeholder="Search Place or Person..." oninput="VaultCore.Explorer.search(this.value)" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-6 py-3 outline-none focus:border-blue-500 transition text-white">
            </div>
        </div>

        <div class="flex gap-4">
            <button onclick="VaultCore.Explorer.renderPlaces()" class="app-btn text-cyan-400">📂 ALL TOURS</button>
            <a href="upload.html" class="app-btn text-blue-400 font-bold">📤 UPLOAD</a>
            <button onclick="sessionStorage.clear(); location.href='index.html'" class="app-btn text-red-500 font-bold">🔒 LOCK</button>
        </div>
    </nav>

    <div class="flex justify-between items-center mb-10">
        <div id="breadcrumb" class="text-[10px] font-mono tracking-widest uppercase flex items-center gap-3 text-slate-500 overflow-x-auto whitespace-nowrap"></div>
        <div id="folderActions" class="hidden flex gap-4 animate__animated animate__fadeIn">
             <button onclick="VaultCore.Explorer.shareFolder()" class="text-[10px] font-bold text-blue-400 border border-blue-400/30 px-4 py-2 rounded-full hover:bg-blue-400 hover:text-white transition">SHARE FOLDER</button>
             <button onclick="VaultCore.Explorer.downloadFolder()" class="text-[10px] font-bold text-green-400 border border-green-400/30 px-4 py-2 rounded-full hover:bg-green-400 hover:text-white transition">DOWNLOAD ALL</button>
        </div>
    </div>

    <div id="explorerGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6 md:gap-10"></div>

    <script src="js/ui-engine.js"></script>
    <script src="js/vault-core.js"></script>
    <script>window.onload = () => VaultCore.Explorer.init();</script>
</body>
</html>
